<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>My App</h1>
        <button id="syncButton">Sincronizar con GitHub</button>
        <div id="syncStatus"></div>
    </header>
    <script>
        const syncButton = document.getElementById('syncButton');
        const syncStatus = document.getElementById('syncStatus');

        // Function to push data to GitHub
        async function pushData() {
            const data = localStorage.getItem('readings');
            const response = await fetch('https://api.github.com/repos/lsbel/tomapresionarterial/contents/readings.json', {
                method: 'PUT',
                headers: {
                    'Authorization': 'token YOUR_PERSONAL_ACCESS_TOKEN',
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                    message: 'Updated readings.json',
                    content: btoa(data),
                    sha: 'a030fee7b3110c4795bce0762568725e7c924400'
                })
            });
            if (response.ok) {
                syncStatus.innerText = 'Data synchronized successfully!';
            } else {
                syncStatus.innerText = 'Error during sync!';
            }
        }

        // Function to pull data from GitHub
        async function pullData() {
            const response = await fetch('https://api.github.com/repos/lsbel/tomapresionarterial/contents/readings.json', {
                headers: {
                    'Authorization': 'token YOUR_PERSONAL_ACCESS_TOKEN',
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            if (response.ok) {
                const data = await response.json();
                const decodedContent = atob(data.content);
                localStorage.setItem('readings', decodedContent);
                syncStatus.innerText = 'Data pulled from GitHub!';
            } else {
                syncStatus.innerText = 'Error during pull!';
            }
        }

        syncButton.addEventListener('click', async () => {
            await pushData();
            await pullData();
        });
    </script>
</body>
</html>
